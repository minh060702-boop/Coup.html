<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cờ Úp Chuẩn</title>
<style>
body{
    background:#d8c29a;
    font-family:Arial;
    text-align:center;
}
.board{
    width:360px;
    height:400px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(9,1fr);
    grid-template-rows:repeat(10,1fr);
    background:#e6c48c;
}
.cell{
    border:1px solid #5c3b1e;
    position:relative;
}
.piece{
    width:34px;
    height:34px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff8e1, #e0b873);
    border:2px solid #5c3b1e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
}
.red{color:#c40000;}
.black{color:black;}
.highlight{background:#aaffaa;}
</style>
</head>

<body>

<h2>CỜ ÚP</h2>
<div id="status"></div>
<div id="board" class="board"></div>

<script>

const ROWS=10;
const COLS=9;

let board=[];
let currentTurn="red";
let selected=null;

const redText={R:"車",N:"馬",B:"相",A:"仕",K:"帥",C:"砲",P:"兵"};
const blackText={R:"车",N:"马",B:"象",A:"士",K:"将",C:"炮",P:"卒"};

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function init(){
    const pieces=["R","R","N","N","B","B","A","A","C","C","P","P","P","P","P","K"];

    let redPieces=shuffle([...pieces]);
    let blackPieces=shuffle([...pieces]);

    let redIndex=0;
    let blackIndex=0;

    const boardDiv=document.getElementById("board");
    boardDiv.innerHTML="";
    board=[];

    for(let r=0;r<ROWS;r++){
        board[r]=[];
        for(let c=0;c<COLS;c++){

            let piece=null;

            if(r<5){
                piece={
                    type:blackPieces[blackIndex++],
                    color:"black",
                    faceUp:false,
                    justRevealed:false
                };
            }else{
                piece={
                    type:redPieces[redIndex++],
                    color:"red",
                    faceUp:false,
                    justRevealed:false
                };
            }

            board[r][c]=piece;

            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.onclick=()=>clickCell(r,c);
            boardDiv.appendChild(cell);
        }
    }

    updateStatus();
    render();
}

function render(){
    document.querySelectorAll(".cell").forEach(cell=>{
        cell.classList.remove("highlight");
        cell.innerHTML="";
        let r=cell.dataset.r;
        let c=cell.dataset.c;
        let p=board[r][c];

        if(p){
            let piece=document.createElement("div");
            piece.className="piece "+p.color;

            if(p.faceUp){
                piece.innerText=p.color==="red"?redText[p.type]:blackText[p.type];
            }else{
                piece.style.background="#c49a6c";
            }
            cell.appendChild(piece);
        }
    });
}

function clickCell(r,c){
    let p=board[r][c];

    // Lật quân
    if(p && !p.faceUp){
        p.faceUp=true;
        p.justRevealed=true;
        render();
        return;
    }

    if(p && p.faceUp && p.color===currentTurn){
        selected={r,c};
        showMoves(r,c);
        return;
    }

    if(selected){
        if(isLegalMove(selected.r,selected.c,r,c)){
            movePiece(selected.r,selected.c,r,c);

            currentTurn=currentTurn==="red"?"black":"red";

            if(isCheckmate(currentTurn)){
                alert("CHIẾU BÍ! "+(currentTurn==="red"?"ĐEN":"ĐỎ")+" thắng!");
                init();
                return;
            }

            selected=null;
            render();
            updateStatus();
        }
        selected=null;
        render();
    }
}

function movePiece(r1,c1,r2,c2){
    board[r2][c2]=board[r1][c1];
    board[r1][c1]=null;
    board[r2][c2].justRevealed=false;
}

function showMoves(r,c){
    render();
    for(let rr=0;rr<ROWS;rr++)
        for(let cc=0;cc<COLS;cc++)
            if(isLegalMove(r,c,rr,cc))
                document.querySelector(`.cell[data-r='${rr}'][data-c='${cc}']`)
                .classList.add("highlight");
}

function inside(r,c){
    return r>=0&&r<10&&c>=0&&c<9;
}

function countBetween(r1,c1,r2,c2){
    let count=0;
    if(r1==r2)
        for(let c=Math.min(c1,c2)+1;c<Math.max(c1,c2);c++)
            if(board[r1][c])count++;
    if(c1==c2)
        for(let r=Math.min(r1,r2)+1;r<Math.max(r1,r2);r++)
            if(board[r][c1])count++;
    return count;
}

function validMove(r1,c1,r2,c2){
    if(!inside(r2,c2))return false;

    let p=board[r1][c1];
    let t=board[r2][c2];
    if(!p|| (t&&t.color===p.color))return false;

    let dr=r2-r1;
    let dc=c2-c1;

    // Nếu vừa lật → đi như Tốt
    if(p.justRevealed){
        if(p.color==="black"){
            if(r1<5) return dr==1&&dc==0;
            return (dr==1&&dc==0)||(dr==0&&Math.abs(dc)==1);
        }else{
            if(r1>4) return dr==-1&&dc==0;
            return (dr==-1&&dc==0)||(dr==0&&Math.abs(dc)==1);
        }
    }

    switch(p.type){

        case"R":
            if(r1!==r2&&c1!==c2)return false;
            return countBetween(r1,c1,r2,c2)===0;

        case"N":
            if(Math.abs(dr)==2&&Math.abs(dc)==1)
                return !board[r1+dr/2][c1];
            if(Math.abs(dr)==1&&Math.abs(dc)==2)
                return !board[r1][c1+dc/2];
            return false;

        case"B":
            if(Math.abs(dr)==2&&Math.abs(dc)==2)
                return !board[r1+dr/2][c1+dc/2];
            return false;

        case"A":
            return Math.abs(dr)==1&&Math.abs(dc)==1;

        case"K":
            return (Math.abs(dr)==1&&dc==0)||(Math.abs(dc)==1&&dr==0);

        case"C":
            if(r1!==r2&&c1!==c2)return false;
            let cnt=countBetween(r1,c1,r2,c2);
            if(t)return cnt===1;
            return cnt===0;

        case"P":
            if(p.color==="black"){
                if(r1<5)return dr==1&&dc==0;
                return (dr==1&&dc==0)||(dr==0&&Math.abs(dc)==1);
            }else{
                if(r1>4)return dr==-1&&dc==0;
                return (dr==-1&&dc==0)||(dr==0&&Math.abs(dc)==1);
            }
    }
    return false;
}

function findKing(color){
    for(let r=0;r<10;r++)
        for(let c=0;c<9;c++){
            let p=board[r][c];
            if(p&&p.type==="K"&&p.color===color)
                return {r,c};
        }
    return null;
}

function isInCheck(color){
    let king=findKing(color);
    if(!king)return true;

    let enemy=color==="red"?"black":"red";

    for(let r=0;r<10;r++)
        for(let c=0;c<9;c++){
            let p=board[r][c];
            if(p&&p.color===enemy&&p.faceUp){
                if(validMove(r,c,king.r,king.c))
                    return true;
            }
        }
    return false;
}

function isLegalMove(r1,c1,r2,c2){
    if(!validMove(r1,c1,r2,c2))return false;

    let backup=board[r2][c2];
    movePiece(r1,c1,r2,c2);

    let inCheck=isInCheck(board[r2][c2].color);

    board[r1][c1]=board[r2][c2];
    board[r2][c2]=backup;

    return !inCheck;
}

function isCheckmate(color){
    if(!isInCheck(color))return false;

    for(let r=0;r<10;r++)
        for(let c=0;c<9;c++){
            let p=board[r][c];
            if(p&&p.color===color&&p.faceUp){
                for(let rr=0;rr<10;rr++)
                    for(let cc=0;cc<9;cc++)
                        if(isLegalMove(r,c,rr,cc))
                            return false;
            }
        }
    return true;
}

function updateStatus(){
    document.getElementById("status").innerText=
    "Lượt: "+(currentTurn==="red"?"ĐỎ":"ĐEN");
}

init();

</script>
</body>
</html>
