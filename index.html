<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cờ Úp Pro</title>

<style>
body{
    margin:0;
    background:#d9c29c;
    text-align:center;
    font-family:Arial;
}

h2{
    margin-top:20px;
}

.board{
    width:360px;
    height:400px;
    margin:20px auto;
    position:relative;
    background:#e6c48c;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.grid{
    position:absolute;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(9,1fr);
    grid-template-rows:repeat(10,1fr);
}

.cell{
    border:1px solid #5c3b1e;
    position:relative;
}

.piece{
    width:32px;
    height:32px;
    background:#f5e2b8;
    border-radius:50%;
    border:2px solid #5c3b1e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
}

.red{
    color:#c40000;
}

.black{
    color:black;
}

button{
    padding:8px 14px;
    margin:10px;
}
</style>
</head>

<body>

<h2>CỜ ÚP ENGINE PRO</h2>

<div class="board">
    <div id="grid" class="grid"></div>
</div>

<button onclick="init()">RESET</button>

<script>

const ROWS=10;
const COLS=9;
let board=[];

function init(){
    const grid=document.getElementById("grid");
    grid.innerHTML="";
    board=[];

    for(let r=0;r<ROWS;r++){
        board[r]=[];
        for(let c=0;c<COLS;c++){
            board[r][c]="U";
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.onclick=()=>flip(r,c);
            grid.appendChild(cell);
        }
    }

    render();
}

function flip(r,c){
    if(board[r][c]!=="U") return;

    let pieces=["R","N","C","B","A","P"];
    let random=pieces[Math.floor(Math.random()*pieces.length)];

    board[r][c]=random;
    render();
}

function render(){
    let cells=document.querySelectorAll(".cell");
    cells.forEach(cell=>{
        cell.innerHTML="";
        let r=cell.dataset.r;
        let c=cell.dataset.c;
        let p=board[r][c];

        if(p){
            let piece=document.createElement("div");
            piece.className="piece";

            if(p==="U"){
                piece.innerText="●";
            }else{
                piece.innerText=p;
                piece.classList.add(
                    Math.random()>0.5?"red":"black"
                );
            }

            cell.appendChild(piece);
        }
    });
}

init();

</script>

</body>
</html>
