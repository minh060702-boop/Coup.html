<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Co Up Engine Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}
.board{
    display:grid;
    grid-template-columns:repeat(9,40px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}
.cell{
    width:40px;
    height:40px;
    border:1px solid #000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    background:white;
    cursor:pointer;
}
.selected{
    background:yellow;
}
button{
    padding:8px 14px;
    margin:5px;
}
</style>
</head>

<body>

<h2>CỜ ÚP ENGINE MOBILE</h2>

<div id="board" class="board"></div>

<button onclick="suggest()">TÍNH NƯỚC TỐI ƯU</button>
<button onclick="resetBoard()">RESET</button>

<p id="info"></p>

<script>

const ROWS = 10;
const COLS = 9;

let board = [];
let selected = null;

const pieceValue = {
    K:1000,R:9,C:7,N:5,B:3,A:2,P:1
};

function init(){
    const bd = document.getElementById("board");
    bd.innerHTML="";
    board=[];

    for(let r=0;r<ROWS;r++){
        board[r]=[];
        for(let c=0;c<COLS;c++){
            board[r][c]=".";
            let cell=document.createElement("div");
            cell.className="cell";
            cell.dataset.r=r;
            cell.dataset.c=c;
            cell.onclick=()=>clickCell(r,c);
            bd.appendChild(cell);
        }
    }
    render();
}

function clickCell(r,c){
    if(selected){
        move(selected.r,selected.c,r,c);
        selected=null;
        render();
        return;
    }

    let p=board[r][c];

    if(p==="."){
        return;
    }

    if(p==="U"){
        choosePiece(r,c);
        return;
    }

    selected={r:r,c:c};
    render();
}

function choosePiece(r,c){
    let p=prompt("Nhập quân (R,N,C,B,A,P) | Hoa = Đỏ | Thường = Đen");
    if(!p) return;
    board[r][c]=p;
    render();
}

function move(r1,c1,r2,c2){
    board[r2][c2]=board[r1][c1];
    board[r1][c1]=".";
}

function render(){
    let cells=document.querySelectorAll(".cell");
    cells.forEach(cell=>{
        let r=cell.dataset.r;
        let c=cell.dataset.c;

        cell.className="cell";

        if(selected && selected.r==r && selected.c==c){
            cell.classList.add("selected");
        }

        cell.innerText = board[r][c]==="." ? "" : board[r][c];
    });
}

function evaluate(){
    let score=0;

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            let p=board[r][c];
            if(p!=="."){
                let v=pieceValue[p.toUpperCase()]||0;
                score += (p===p.toUpperCase()) ? v : -v;
            }
        }
    }

    return score;
}

function suggest(){
    let material=evaluate();
    document.getElementById("info").innerText=
    "Điểm vật chất hiện tại: "+material;
}

function resetBoard(){
    init();
}

init();

</script>

</body>
</html>
